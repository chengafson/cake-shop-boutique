<!DOCTYPE html>

<html>

<head>
	<!-- CSS only -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">
	<img src="pics/petshop1.png" width="200" height="150" alt="petshop">
	<title>Doga Store</title>
</head>
		
<body>
	<div class="container-fluid">
		<div class="row justify-content-center">
			<div class="col-7 text center">
				<button type="button" class="btn btn-outline-dark">NEW</button>
				<button type="button" class="btn btn-outline-dark">WALK</button>
				<button type="button" class="btn btn-outline-dark">WEAR</button>
				<button type="button" class="btn btn-outline-dark">EAT</button>
				<button type="button" class="btn btn-outline-dark">PLAY</button>
				<button type="button" class="btn btn-outline-dark">HOME</button>
				<button type="button" class="btn btn-outline-dark">SALE</button>
				<button type="button" class="btn btn-outline-dark">CART</button>
			</div>
		</div>
	</div>
	<div class="container">
		<div class="row justify-content-between">
			<div class="col-7 text center">
				<nav class="navbar navbar-light">
					<form class="form-inline">
					  <input class="form-control mr-sm-2" type="search" placeholder="Find the best for your pet" aria-label="Search">
					  <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
					</form>
				  </nav>
			</div>	
		</div>
	</div>
	<div class="container">
		<div class="row justify-content-end">
			<div class="col-7 text center">
				<button type="button" class="btn btn-outline-dark" data-bs-toggle="modal" data-bs-target="#exampleModal">
					SUBSCRIBE TO OUR NEWSLETTER
				  </button>
			</div>	
		</div>
	</div>


  
  <!-- Modal -->
  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
	<div class="modal-dialog">
	  <div class="modal-content">
		<div class="modal-header">
		  <h5 class="modal-title" id="exampleModalLabel">Subscribe to hear more about us.</h5>
		  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
		</div>
		<div class="modal-body">
			<form>
				<div class="form-group">
				  <label for="exampleInputEmail1">Email address</label>
				  <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email">
				  <small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
				</div>
			</form>
		</div>
		<div class="modal-footer">
		  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
		  <button type="button" class="btn btn-primary">Save</button>
		</div>
	  </div>
	</div>
  </div>
	<!-- JavaScript Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj" crossorigin="anonymous"></script>
</body>

</html>
